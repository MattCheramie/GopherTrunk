name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: make integration

  # The pure-Go USB transport (internal/sdr/rtlsdr/usb) lands platform-
  # specific backends — Linux USBDEVFS, Windows WinUSB, macOS IOKit
  # (PR-10). Each must build + test cleanly under CGO_ENABLED=0 on its
  # native runner before merge.
  usb-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...

  usb-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...
